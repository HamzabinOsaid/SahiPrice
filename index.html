<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SahiPrice</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0
}

body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#080e1c;
  color:#e2e8f0;
  min-height:100vh;
}

.container{
  max-width:960px;
  margin:auto;
  padding:28px 20px;
}

h1{
  text-align:center;
  font-size:2rem;
  margin-bottom:6px;
  letter-spacing:-0.5px;
}

.subtitle{
  text-align:center;
  color:#64748b;
  font-size:14px;
  margin-bottom:28px;
}

.card{
  background:#111827;
  padding:24px;
  border-radius:16px;
  margin-bottom:16px;
  border:1px solid #1e293b;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px
}

label{
  font-size:12px;
  font-weight:600;
  color:#94a3b8;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

select,input{
  padding:11px 14px;
  border-radius:10px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:#e2e8f0;
  font-size:14px;
  outline:none;
  transition:border-color .2s;
}

select:focus,input:focus{
  border-color:#38bdf8
}

.btn{
  width:100%;
  margin-top:8px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#38bdf8,#818cf8);
  color:#fff;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  transition:opacity .2s,transform .1s;
}

.btn:hover{
  opacity:.9
}

.btn:active{
  transform:scale(.98)
}

/* Result */
.result-box{
  text-align:center;
  padding:8px 0;
}

.verdict{
  font-size:2rem;
  font-weight:800;
  letter-spacing:-1px;
}

.range-label{
  margin-top:6px;
  font-size:13px;
  color:#64748b;
}

.price-bar{
  height:8px;
  border-radius:99px;
  background:#1e293b;
  margin:14px 0 6px;
  overflow:hidden;
}

.price-bar-fill{
  height:100%;
  border-radius:99px;
  transition:width .6s ease;
}

.good{color:#34d399}
.warn{color:#fbbf24}
.bad{color:#f87171}

/* Category pills */
.cat-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:18px;
}

.cat-pill{
  padding:7px 14px;
  border-radius:99px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:#94a3b8;
  font-size:13px;
  cursor:pointer;
  transition:all .2s;
  user-select:none;
}

.cat-pill:hover{
  border-color:#38bdf8;
  color:#e2e8f0
}

.cat-pill.active{
  background:#1e3a5f;
  border-color:#38bdf8;
  color:#38bdf8;
  font-weight:600
}

.sub-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:18px;
}

.sub-pill{
  padding:6px 13px;
  border-radius:99px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:#94a3b8;
  font-size:12px;
  cursor:pointer;
  transition:all .2s;
  user-select:none;
}

.sub-pill:hover{
  border-color:#818cf8;
  color:#e2e8f0
}

.sub-pill.active{
  background:#1e1b4b;
  border-color:#818cf8;
  color:#818cf8;
  font-weight:600
}

/* Shops */
.shops-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.shops-header h3{
  font-size:15px;
  font-weight:700
}

.shop-count{
  font-size:12px;
  color:#64748b
}

.shop-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:10px;
  transition:border-color .2s;
}

.shop-card:hover{
  border-color:#334155
}

.shop-name{
  font-weight:600;
  font-size:14px;
  margin-bottom:2px
}

.shop-meta{
  font-size:12px;
  color:#64748b
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:99px;
  font-size:11px;
  font-weight:600;
}

.badge.good{
  background:rgba(52,211,153,.15);
  color:#34d399
}

.badge.warn{
  background:rgba(251,191,36,.15);
  color:#fbbf24
}

.badge.bad{
  background:rgba(248,113,113,.15);
  color:#f87171
}

.score{
  font-size:11px;
  color:#64748b;
  text-align:right;
  margin-top:3px
}

.empty{
  text-align:center;
  padding:24px;
  color:#475569;
  font-size:14px
}

/* Section title */
.section-title{
  font-size:13px;
  font-weight:700;
  color:#64748b;
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:10px;
}

@media(max-width:580px){
  .grid2{
    grid-template-columns:1fr
  }

  h1{
    font-size:1.5rem
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>💸 SahiPrice</h1>
  <p class="subtitle">Check if you're paying a fair price in Pakistan</p>

  <div class="card">

    <div class="grid2">

      <div class="field">
        <label>City</label>
        <select id="city" onchange="loadCategories()"></select>
      </div>

      <div class="field">
        <label>Enter Price (PKR)</label>
        <input type="number" id="price" placeholder="e.g. 2500" min="0">
      </div>

    </div>

    <label style="margin-top:18px;display:block">Category</label>
    <div class="cat-grid" id="cat-grid"></div>

    <label>Subcategory</label>
    <div class="sub-grid" id="sub-grid"></div>

    <button class="btn" onclick="checkPrice()">✦ Check Price</button>

  </div>

  <div class="card" id="result-card" style="display:none">

    <div class="result-box">

      <div class="verdict" id="verdict"></div>

      <div class="range-label" id="range-label"></div>

      <div class="price-bar">
        <div class="price-bar-fill" id="bar-fill"></div>
      </div>

      <small id="bar-hint" style="font-size:12px;color:#64748b"></small>

    </div>

  </div>

  <div class="card" id="shops-card" style="display:none">

    <div class="shops-header">
      <h3>Suggested Shops / Services</h3>
      <span class="shop-count" id="shop-count"></span>
    </div>

    <div id="providers"></div>

  </div>

</div>

<script>

/* ===================== DATA ===================== */

const data = {
  Rawalpindi:{
    "🍽️ Food & Restaurants":{
      "Burger":{
        range:[200,800],
        shops:[
          "Burger Lab",
          "Cheezious",
          "Howdy",
          "Burger King",
          "Daily Deli"
        ]
      },
      "Pizza (medium)":{
        range:[600,2000],
        shops:[
          "Domino's",
          "Pizza Hut",
          "Broadway Pizza",
          "14th Street Pizza"
        ]
      }
    },

    "🛵 Mobile Repair":{
      "Screen Replacement":{
        range:[2000,12000],
        shops:[
          "iTech Saddar",
          "Phone Doctor",
          "Mobile Zone"
        ]
      }
    }
  },

  Lahore:{
    "🍽️ Food & Restaurants":{
      "Burger":{
        range:[200,800],
        shops:[
          "Burger Lab Lahore",
          "Howdy Lahore",
          "Daily Deli Lahore"
        ]
      }
    }
  }
};

/* ===================== STATE ===================== */

let selectedCat = null;
let selectedSub = null;

/* ===================== INIT ===================== */

const cityEl = document.getElementById("city");

Object.keys(data).forEach(c => {
  cityEl.innerHTML += `<option value="${c}">${c}</option>`;
});

loadCategories();

/* ===================== LOADERS ===================== */

function loadCategories(){

  selectedCat = null;
  selectedSub = null;

  const city = cityEl.value;

  const cats = Object.keys(data[city]);

  const grid = document.getElementById("cat-grid");

  grid.innerHTML = "";

  cats.forEach(cat => {

    const pill = document.createElement("div");

    pill.className = "cat-pill";

    pill.textContent = cat;

    pill.onclick = () => selectCat(cat, pill);

    grid.appendChild(pill);

  });

  document.getElementById("sub-grid").innerHTML =
    "<span style='color:#475569;font-size:13px'>Select a category first</span>";

  document.getElementById("result-card").style.display = "none";
  document.getElementById("shops-card").style.display = "none";
}

function selectCat(cat, pill){

  selectedCat = cat;
  selectedSub = null;

  document.querySelectorAll(".cat-pill")
    .forEach(p => p.classList.remove("active"));

  pill.classList.add("active");

  loadSubs(cat);
}

function loadSubs(cat){

  const city = cityEl.value;

  const subs = Object.keys(data[city][cat]);

  const grid = document.getElementById("sub-grid");

  grid.innerHTML = "";

  subs.forEach(sub => {

    const pill = document.createElement("div");

    pill.className = "sub-pill";

    pill.textContent = sub;

    pill.onclick = () => selectSub(sub, pill);

    grid.appendChild(pill);

  });
}

function selectSub(sub, pill){

  selectedSub = sub;

  document.querySelectorAll(".sub-pill")
    .forEach(p => p.classList.remove("active"));

  pill.classList.add("active");
}

/* ===================== CHECK PRICE ===================== */

function checkPrice(){

  if(!selectedCat){
    alert("Please select a category");
    return;
  }

  if(!selectedSub){
    alert("Please select a subcategory");
    return;
  }

  const priceVal = Number(document.getElementById("price").value);

  if(!priceVal || priceVal <= 0){
    alert("Please enter a valid price");
    return;
  }

  const city = cityEl.value;

  const entry = data[city][selectedCat][selectedSub];

  const [low, high] = entry.range;

  let verdict = "";
  let cls = "";
  let pct = 0;

  if(priceVal < low * 0.85){

    verdict = "Very Cheap ✓";
    cls = "good";
    pct = 20;

  } else if(priceVal <= low){

    verdict = "Below Average ✓";
    cls = "good";
    pct = 40;

  } else if(priceVal <= high){

    verdict = "Fair Price ✓";
    cls = "warn";
    pct = 70;

  } else if(priceVal <= high * 1.2){

    verdict = "A Bit Pricey ⚠";
    cls = "warn";
    pct = 90;

  } else {

    verdict = "Overpriced ✗";
    cls = "bad";
    pct = 100;
  }

  const barColors = {
    good:"#34d399",
    warn:"#fbbf24",
    bad:"#f87171"
  };

  document.getElementById("result-card").style.display = "block";

  const verdictEl = document.getElementById("verdict");

  verdictEl.className = `verdict ${cls}`;

  verdictEl.textContent = verdict;

  document.getElementById("range-label").textContent =
    `Expected fair range: PKR ${low.toLocaleString()} – ${high.toLocaleString()}`;

  const fill = document.getElementById("bar-fill");

  fill.style.width = "0%";

  fill.style.background = barColors[cls];

  setTimeout(()=>{
    fill.style.width = pct + "%";
  },50);

  document.getElementById("bar-hint").textContent =
    pct < 50
      ? "You're paying less than average — great deal!"
      : pct < 75
      ? "You're paying a fair market price."
      : pct < 90
      ? "Slightly above average — shop around."
      : "You're overpaying — check alternatives below.";

  /* Shops */

  document.getElementById("shops-card").style.display = "block";

  const shops = entry.shops;

  document.getElementById("shop-count").textContent =
    `${shops.length} options found`;

  const container = document.getElementById("providers");

  container.innerHTML = "";

  shops.forEach((name, i) => {

    const seed = (name.length * 7 + i * 13) % 40;

    const score = 62 + seed;

    let label = "Average";
    let badge = "warn";

    if(score >= 85){
      label = "Top Rated";
      badge = "good";
    }
    else if(score >= 75){
      label = "Trusted";
      badge = "good";
    }
    else if(score < 65){
      label = "Unverified";
      badge = "bad";
    }

    container.innerHTML += `
      <div class="shop-card">

        <div>
          <div class="shop-name">${name}</div>
          <div class="shop-meta">${selectedCat} • ${selectedSub}</div>
        </div>

        <div style="text-align:right">
          <div>
            <span class="badge ${badge}">${label}</span>
          </div>
          <div class="score">${score}/100</div>
        </div>

      </div>
    `;
  });
}

</script>

</body>
</html>
